# ==========================================
# PRICEINSIGHT SPRING BOOT CONFIGURATION
# ==========================================

server.port=8080
server.servlet.context-path=

# ==========================================
# DATABASE CONFIGURATION (SUPABASE POSTGRESQL)
# ==========================================

spring.datasource.url=jdbc:postgresql://db.ywunnwuekgmoflrdpvak.supabase.co:5432/postgres?prepareThreshold=0&sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# HIKARICP
# ==========================================

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ==========================================
# JPA / HIBERNATE
# ==========================================

# validate = só verifica o schema, não altera nada (seguro para produção)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialeto explícito
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Compatibilidade com Supabase/PgBouncer
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false

# ==========================================
# SPRING MVC
# ==========================================

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ==========================================
# LOGGING
# ==========================================

logging.level.com.priceinsight=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.com.zaxxer.hikari=DEBUG

logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n